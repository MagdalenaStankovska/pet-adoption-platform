# ============================================================================
# Docker Compose for Pet Adoption Platform
# Orchestrates Frontend (Nginx), Backend (Express), and Database (MongoDB)
# ============================================================================

services:
  # Frontend - React application served via Nginx
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: pet-adoption-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pet-adoption-network
    restart: unless-stopped
    labels:
      - "com.pet-adoption.description=Frontend Service"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Backend - Express API server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pet-adoption-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://petadmin:petadmin123@mongodb:27017/pet-adoption?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - pet-adoption-network
    restart: unless-stopped
    labels:
      - "com.pet-adoption.description=Backend API Service"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    volumes:
      - ./server/logs:/app/logs

  # Database - MongoDB
  mongodb:
    image: mongo:latest
    container_name: pet-adoption-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=pet-adoption
      - MONGO_INITDB_ROOT_USERNAME=petadmin
      - MONGO_INITDB_ROOT_PASSWORD=petadmin123
    networks:
      - pet-adoption-network
    restart: unless-stopped
    labels:
      - "com.pet-adoption.description=MongoDB Database"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username petadmin --password petadmin123 --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

# Networks
networks:
  pet-adoption-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Persistent volumes for data
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local








