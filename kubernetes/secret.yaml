# ============================================================================
# Kubernetes Secrets for Pet Adoption Platform
# Sensitive configuration: database credentials, API keys, etc.
# 
# NOTE: In production, use sealed-secrets or external-secrets operator
# This is for demonstration purposes only
# ============================================================================

---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
  namespace: pet-adoption
  labels:
    app: pet-adoption
    component: database
type: Opaque
stringData:
  # MongoDB root credentials
  MONGO_INITDB_ROOT_USERNAME: petadmin
  MONGO_INITDB_ROOT_PASSWORD: petadmin123
  # MongoDB connection URI for applications
  MONGO_URI: mongodb://petadmin:petadmin123@mongodb-clusterip:27017/pet-adoption?authSource=admin

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: pet-adoption
  labels:
    app: pet-adoption
    component: backend
type: Opaque
stringData:
  # API Keys and secrets for backend
  API_KEY: your-api-key-here
  JWT_SECRET: your_jwt_secret_key_change_in_production
  SESSION_SECRET: your_session_secret_change_in_production

---
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry-credentials
  namespace: pet-adoption
  labels:
    app: pet-adoption
type: kubernetes.io/dockercfg
stringData:
  .dockercfg: '{"ghcr.io": {"auth": "your_base64_encoded_credentials"}}'

