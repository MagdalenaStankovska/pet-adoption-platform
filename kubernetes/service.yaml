# ============================================================================
# Kubernetes Services for Pet Adoption Platform
# Frontend and Backend Services with load balancing
# ============================================================================

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: pet-adoption
  labels:
    app: pet-adoption
    component: frontend
  annotations:
    description: "Frontend Service - Load Balancer"
spec:
  type: ClusterIP
  selector:
    app: pet-adoption
    component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: pet-adoption
  labels:
    app: pet-adoption
    component: backend
  annotations:
    description: "Backend Service - Load Balancer"
spec:
  type: ClusterIP
  selector:
    app: pet-adoption
    component: backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP
  sessionAffinity: ClientIP

---
# MongoDB Headless Service (for StatefulSet)
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: pet-adoption
  labels:
    app: pet-adoption
    component: database
  annotations:
    description: "MongoDB Headless Service for StatefulSet"
spec:
  clusterIP: None
  selector:
    app: pet-adoption
    component: database
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
      protocol: TCP
  publishNotReadyAddresses: true

