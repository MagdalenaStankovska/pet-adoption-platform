# ============================================================================
# GitHub Actions CI/CD Pipeline
# Builds and publishes Docker images to GitHub Container Registry (GHCR)
# Triggered on push to main/master and on pull requests
# ============================================================================

name: CI/CD Pipeline - Docker Build & Push

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==============================
  # Build and test
  # ==============================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ==============================
      # Backend Build and Test
      # ==============================
      - name: Set up Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: |
          cd server
          npm ci

      - name: Lint server code
        run: |
          cd server
          npm run lint --if-present || echo "No lint script found"

      - name: Run server tests
        run: |
          cd server
          npm test --if-present || echo "No test script found"

      # ==============================
      # Frontend Build and Test
      # ==============================
      - name: Set up Node.js for client
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: |
          cd client
          npm ci

      - name: Lint client code
        run: |
          cd client
          npm run lint --if-present || echo "No lint script found"

      - name: Build client
        run: |
          cd client
          npm run build

      - name: Run client tests
        run: |
          cd client
          npm test --if-present --watchAll=false || echo "No test script found"

  # ==============================
  # Docker Image Build and Push
  # ==============================
  push-images:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: frontend
            dockerfile: ./client/Dockerfile
            context: ./client
            image-name: pet-adoption-frontend
          - service: backend
            dockerfile: ./server/Dockerfile
            context: ./server
            image-name: pet-adoption-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.image-name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==============================
  # Security Scanning
  # ==============================
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan backend dependencies with npm
        run: |
          cd server
          npm audit --production || true

      - name: Scan client dependencies with npm
        run: |
          cd client
          npm audit --production || true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # ==============================
  # Deployment Notification
  # ==============================
  notify:
    needs: push-images
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Create deployment notification
        run: |
          echo "✅ Docker images built and pushed successfully!"
          echo "🐳 Frontend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-pet-adoption-frontend:latest"
          echo "🐳 Backend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-pet-adoption-backend:latest"

