# ============================================================================
# Kubernetes Deployment for Frontend (React + Nginx)
# Includes:
# - Health checks (liveness and readiness probes)
# - Resource requests and limits
# - Auto-scaling configuration
# - Rolling update strategy
# ============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pet-adoption
  labels:
    app: pet-adoption
    component: frontend
  annotations:
    description: "Pet Adoption Platform - React Frontend"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pet-adoption
      component: frontend
  template:
    metadata:
      labels:
        app: pet-adoption
        component: frontend
      annotations:
        prometheus.io/scrape: "false"
    spec:
      # Pod Disruption Budget for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - pet-adoption
                    - key: component
                      operator: In
                      values:
                        - frontend
                topologyKey: kubernetes.io/hostname

      # Service Account
      serviceAccountName: default

      # Security Context for the pod
      securityContext:
        runAsNonRoot: false
        runAsUser: 0

      # Init containers
      initContainers: []

      containers:
        - name: frontend
          image: ghcr.io/pet-adoption-platform/pet-adoption-frontend:latest
          imagePullPolicy: IfNotPresent

          # Ports
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          # Environment variables from ConfigMaps and Secrets
          env:
            - name: REACT_APP_API_URL
              valueFrom:
                configMapKeyRef:
                  name: frontend-config
                  key: REACT_APP_API_URL
            - name: REACT_APP_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: frontend-config
                  key: REACT_APP_ENVIRONMENT

          # Resource requests and limits
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          # Liveness probe
          livenessProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          # Readiness probe
          readinessProbe:
            httpGet:
              path: /
              port: http
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3

          # Security context for container
          securityContext:
            allowPrivilegeEscalation: true
            runAsNonRoot: false
            readOnlyRootFilesystem: false
            capabilities: {}

          # Volume mounts
          volumeMounts: []

      # Volumes
      volumes: []

      # DNS configuration
      dnsPolicy: ClusterFirst

      # Restart policy
      restartPolicy: Always

      # Timeouts
      terminationGracePeriodSeconds: 30

---
# Horizontal Pod Autoscaler for Frontend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: pet-adoption
  labels:
    app: pet-adoption
    component: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

