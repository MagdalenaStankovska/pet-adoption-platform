apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-seed
  namespace: pet-adoption
  labels:
    app: pet-adoption
    component: database
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        app: pet-adoption
        component: database
    spec:
      # Run the seeder using the backend image already present in the repo
      containers:
        - name: seeder
          image: ghcr.io/pet-adoption-platform/pet-adoption-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "scripts/seedData.js"]
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: MONGO_URI
      restartPolicy: OnFailure

